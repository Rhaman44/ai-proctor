<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ProctorAI — Student Report</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f14;--surface:#151820;--surface2:#1c2030;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#e8eaf0;--muted:#7a7f92;--accent:#5b7fff;
  --accent-dim:rgba(91,127,255,0.12);--red:#ff4e4e;--red-dim:rgba(255,78,78,0.12);
  --amber:#f5a623;--amber-dim:rgba(245,166,35,0.1);--green:#3ecf8e;
  --mono:'Space Mono',monospace;--sans:'DM Sans',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;}
header{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;border-bottom:1px solid var(--border);}
.logo{font-family:var(--mono);font-size:14px;font-weight:700;}.logo span{color:var(--accent);}
.hdr-actions{display:flex;gap:10px;}
.btn{font-size:12px;font-family:var(--mono);padding:7px 16px;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;transition:all 0.15s;}
.btn:hover{background:var(--surface2);color:var(--text);}
.btn-accent{background:var(--accent);border-color:var(--accent);color:white;}
.btn-accent:hover{background:#4a6ef5;}

main{max-width:860px;margin:0 auto;padding:32px 24px;}

/* Summary card */
.summary-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;margin-bottom:24px;}
.report-header{display:flex;align-items:flex-start;gap:20px;margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid var(--border);}
.report-avatar{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;flex-shrink:0;}
.report-name{font-size:22px;font-weight:700;margin-bottom:4px;}
.report-meta{font-size:12px;color:var(--muted);font-family:var(--mono);}
.verdict-badge{margin-left:auto;padding:8px 18px;border-radius:10px;font-family:var(--mono);font-weight:700;font-size:13px;}
.verdict-clean{background:rgba(62,207,142,0.12);color:var(--green);border:1px solid rgba(62,207,142,0.2);}
.verdict-flagged{background:var(--amber-dim);color:var(--amber);border:1px solid rgba(245,166,35,0.2);}
.verdict-terminated{background:var(--red-dim);color:var(--red);border:1px solid rgba(255,78,78,0.2);}

.stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px;}
.stat{background:var(--surface2);border-radius:10px;padding:14px;text-align:center;}
.stat-val{font-size:22px;font-family:var(--mono);font-weight:700;line-height:1;}
.stat-lbl{font-size:10px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:0.07em;font-family:var(--mono);}

/* Breakdown chart */
.breakdown{display:flex;flex-direction:column;gap:8px;margin-bottom:20px;}
.breakdown-row{display:flex;align-items:center;gap:12px;}
.breakdown-label{font-size:12px;font-family:var(--mono);color:var(--muted);width:160px;flex-shrink:0;}
.breakdown-bar-wrap{flex:1;background:var(--surface2);border-radius:4px;height:8px;overflow:hidden;}
.breakdown-bar{height:100%;border-radius:4px;transition:width 0.5s ease;}
.breakdown-count{font-size:12px;font-family:var(--mono);color:var(--muted);width:24px;text-align:right;}

/* Heatmap */
.heatmap-wrap{background:var(--surface2);border-radius:10px;padding:16px;margin-bottom:20px;}
.heatmap-grid{display:flex;gap:3px;align-items:flex-end;height:64px;}
.heatmap-bar{flex:1;border-radius:3px 3px 0 0;min-height:3px;}
.heatmap-labels{display:flex;justify-content:space-between;margin-top:5px;}
.heatmap-label{font-size:9px;font-family:var(--mono);color:var(--muted);}

/* Timeline table */
.viol-table{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.viol-head{display:grid;grid-template-columns:90px 120px 1fr 90px;padding:10px 16px;background:var(--surface2);border-bottom:1px solid var(--border);}
.th{font-size:10px;font-family:var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;}
.viol-row{display:grid;grid-template-columns:90px 120px 1fr 90px;padding:12px 16px;border-bottom:1px solid var(--border);align-items:center;}
.viol-row:last-child{border-bottom:none;}
.viol-row:hover{background:var(--surface2);}
.vtag{font-size:10px;font-family:var(--mono);font-weight:700;padding:3px 9px;border-radius:6px;}
.vtag-phone{background:rgba(91,127,255,0.12);color:#5b7fff;}
.vtag-seat{background:rgba(245,166,35,0.1);color:#f5a623;}
.vtag-face{background:rgba(200,100,255,0.1);color:#c864ff;}
.vtag-look{background:rgba(255,140,60,0.1);color:#ff8c3c;}
.vtag-tab{background:rgba(255,78,78,0.12);color:#ff4e4e;}
.vtag-audio{background:rgba(62,207,142,0.12);color:#3ecf8e;}
.screenshot-thumb{width:70px;height:45px;object-fit:cover;border-radius:5px;border:1px solid var(--border);cursor:pointer;}
.no-img{width:70px;height:45px;border-radius:5px;border:1px dashed var(--border2);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--muted);}

.section-title{font-size:11px;font-family:var(--mono);text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:12px;}

/* Lightbox */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:300;display:none;align-items:center;justify-content:center;}
.lightbox.show{display:flex;}
.lightbox img{max-width:90vw;max-height:85vh;border-radius:10px;}
.lightbox-close{position:absolute;top:20px;right:24px;font-size:24px;color:#7a7f92;cursor:pointer;background:none;border:none;}

/* Loading */
#loadingState{text-align:center;padding:80px;color:var(--muted);font-family:var(--mono);}
</style>
</head>
<body>
<header>
  <div class="logo">Proctor<span>AI</span> — Student Report</div>
  <div class="hdr-actions">
    <button class="btn" onclick="window.close()">← Back</button>
    <button class="btn btn-accent" onclick="exportPDF()">Export PDF</button>
  </div>
</header>

<main>
  <div id="loadingState">Loading report...</div>
  <div id="reportContent" style="display:none;"></div>
</main>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close">✕</button>
  <img id="lightboxImg" src="" alt="evidence"/>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getAuth,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import{getFirestore,collection,query,where,orderBy,getDocs,doc,getDoc}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import{FIREBASE_CONFIG}from"./config.js";

const app=initializeApp(FIREBASE_CONFIG);
const auth=getAuth(app);
const db=getFirestore(app);

const params=new URLSearchParams(location.search);
const studentId=params.get('student');
const autoExport=params.get('export')==='pdf';

if(!studentId){document.getElementById('loadingState').textContent='No student specified.';throw new Error('no student');}

onAuthStateChanged(auth,async user=>{
  if(!user){window.location.href='login.html';return;}
  await loadReport();
  if(autoExport)setTimeout(exportPDF,1000);
});

const VTYPES={
  'PHONE_DETECTED':{label:'Phone Detected',cls:'vtag-phone',color:'#5b7fff'},
  'LEFT_SEAT':{label:'Left Seat',cls:'vtag-seat',color:'#f5a623'},
  'MULTIPLE_FACES':{label:'Multiple Faces',cls:'vtag-face',color:'#c864ff'},
  'LOOKING_AWAY_SHORT':{label:'Looking Away (Short)',cls:'vtag-look',color:'#ff8c3c'},
  'LOOKING_AWAY_LONG':{label:'Looking Away (Long)',cls:'vtag-look',color:'#ff8c3c'},
  'TAB_SWITCH':{label:'Tab Switch',cls:'vtag-tab',color:'#ff4e4e'},
  'WINDOW_UNFOCUSED':{label:'Window Unfocused',cls:'vtag-tab',color:'#ff4e4e'},
  'AUDIO_DETECTED':{label:'Audio Detected',cls:'vtag-audio',color:'#3ecf8e'},
};
function vt(type){return VTYPES[type]||{label:type,cls:'vtag-tab',color:'#7a7f92'};}
function fmtTime(ts){if(!ts)return'--';const d=ts.toDate?ts.toDate():new Date(ts);return d.toLocaleTimeString('en-IN',{hour12:false});}
function fmtDateTime(ts){if(!ts)return'--';const d=ts.toDate?ts.toDate():new Date(ts);return d.toLocaleString('en-IN');}
function initials(name){return(name||'?').split(' ').map(p=>p[0]).join('').toUpperCase().slice(0,2);}
const COLORS=['rgba(91,127,255,0.18)','rgba(62,207,142,0.15)','rgba(245,166,35,0.15)','rgba(200,100,255,0.15)','rgba(255,140,60,0.15)','rgba(255,78,78,0.15)'];
const COLORSC=['#5b7fff','#3ecf8e','#f5a623','#c864ff','#ff8c3c','#ff4e4e'];
function getColor(id){const i=Math.abs([...(id||'x')].reduce((a,c)=>a+c.charCodeAt(0),0))%COLORS.length;return{bg:COLORS[i],c:COLORSC[i]};}

async function loadReport(){
  const stuRef=doc(db,'students',studentId);
  const stuSnap=await getDoc(stuRef);
  if(!stuSnap.exists()){document.getElementById('loadingState').textContent='Student not found.';return;}
  const s={id:studentId,...stuSnap.data()};

  const vQuery=query(collection(db,'violations'),where('studentId','==',studentId),orderBy('timestamp','asc'));
  const vSnap=await getDocs(vQuery);
  const violations=vSnap.docs.map(d=>({id:d.id,...d.data()}));

  renderReport(s,violations);
}

function renderReport(s,violations){
  document.getElementById('loadingState').style.display='none';
  const el=document.getElementById('reportContent');
  el.style.display='block';

  const c=getColor(s.id);
  const vc=violations.length;
  const phones=violations.filter(v=>v.type==='PHONE_DETECTED').length;
  const tabs=violations.filter(v=>v.type==='TAB_SWITCH'||v.type==='WINDOW_UNFOCUSED').length;
  const gaze=violations.filter(v=>v.type.includes('LOOKING')).length;
  const audio=violations.filter(v=>v.type==='AUDIO_DETECTED').length;
  const multi=violations.filter(v=>v.type==='MULTIPLE_FACES').length;

  const verdict=s.terminated?'TERMINATED':vc===0?'CLEAN':vc>=4?'HIGH RISK':'FLAGGED';
  const verdictCls=s.terminated?'verdict-terminated':vc===0?'verdict-clean':'verdict-flagged';

  // Breakdown
  const counts=[
    {label:'Phone Detection',n:phones,color:'#5b7fff'},
    {label:'Tab Switches',n:tabs,color:'#ff4e4e'},
    {label:'Gaze Violations',n:gaze,color:'#ff8c3c'},
    {label:'Audio Events',n:audio,color:'#3ecf8e'},
    {label:'Multiple Faces',n:multi,color:'#c864ff'},
  ];
  const maxN=Math.max(...counts.map(c=>c.n),1);
  const breakdownHTML=counts.map(c=>`
    <div class="breakdown-row">
      <div class="breakdown-label">${c.label}</div>
      <div class="breakdown-bar-wrap"><div class="breakdown-bar" style="width:${(c.n/maxN)*100}%;background:${c.color};"></div></div>
      <div class="breakdown-count">${c.n}</div>
    </div>`).join('');

  // Heatmap
  const times=violations.map(v=>v.timestamp?.toDate?v.timestamp.toDate():new Date(v.timestamp)).filter(Boolean);
  let heatHTML='';
  if(times.length>=2){
    const mn=Math.min(...times),mx=Math.max(...times);
    const range=Math.max(mx-mn,60000);
    const SLOTS=30;const buckets=Array(SLOTS).fill(0);
    times.forEach(t=>{const idx=Math.min(SLOTS-1,Math.floor(((t-mn)/range)*SLOTS));buckets[idx]++;});
    const maxB=Math.max(...buckets,1);
    const bars=buckets.map(b=>{
      const h=Math.max(4,Math.round((b/maxB)*60));
      const col=b===0?'var(--surface)':b>=3?'var(--red)':b>=2?'var(--amber)':'var(--accent)';
      return`<div class="heatmap-bar" style="height:${h}px;background:${col};"></div>`;
    }).join('');
    const s1=new Date(mn).toLocaleTimeString('en-IN',{hour12:false,hour:'2-digit',minute:'2-digit'});
    const s2=new Date(mx).toLocaleTimeString('en-IN',{hour12:false,hour:'2-digit',minute:'2-digit'});
    heatHTML=`<div class="heatmap-wrap">
      <div class="section-title">Violation Heatmap (exam duration)</div>
      <div class="heatmap-grid">${bars}</div>
      <div class="heatmap-labels"><span class="heatmap-label">${s1}</span><span class="heatmap-label">${s2}</span></div>
    </div>`;
  }

  // Timeline table
  const tlRows=violations.map((v,i)=>{
    const info=vt(v.type);
    const imgHTML=v.screenshotUrl
      ?`<img class="screenshot-thumb" src="${v.screenshotUrl}" onclick="openLightbox('${v.screenshotUrl}')" alt="evidence">`
      :`<div class="no-img">no img</div>`;
    return`<div class="viol-row">
      <div style="font-family:var(--mono);font-size:11px;color:var(--muted);">${i+1}. ${fmtTime(v.timestamp)}</div>
      <div><span class="vtag ${info.cls}">${v.type.replace(/_/g,' ')}</span></div>
      <div style="font-size:13px;">${info.label}</div>
      <div>${imgHTML}</div>
    </div>`;
  }).join('');

  el.innerHTML=`
    <div class="summary-card">
      <div class="report-header">
        <div class="report-avatar" style="background:${c.bg};color:${c.c};">${initials(s.name)}</div>
        <div>
          <div class="report-name">${s.name}</div>
          <div class="report-meta">${s.id} · Slot: ${s.slot||'—'} · Generated: ${new Date().toLocaleString('en-IN')}</div>
          ${s.terminated?`<div style="font-size:12px;color:var(--red);margin-top:4px;font-family:var(--mono);">Terminated at ${fmtTime(s.terminatedAt)}</div>`:''}
        </div>
        <div class="verdict-badge ${verdictCls}">${verdict}</div>
      </div>

      <div class="stats-row">
        <div class="stat"><div class="stat-val" style="color:var(--red);">${vc}</div><div class="stat-lbl">Total</div></div>
        <div class="stat"><div class="stat-val" style="color:#5b7fff;">${phones}</div><div class="stat-lbl">Phone</div></div>
        <div class="stat"><div class="stat-val" style="color:var(--red);">${tabs}</div><div class="stat-lbl">Tab Switch</div></div>
        <div class="stat"><div class="stat-val" style="color:#ff8c3c;">${gaze}</div><div class="stat-lbl">Gaze</div></div>
        <div class="stat"><div class="stat-val" style="color:var(--green);">${audio}</div><div class="stat-lbl">Audio</div></div>
      </div>

      <div class="section-title">Violation Breakdown</div>
      <div class="breakdown" style="margin-bottom:20px;">${breakdownHTML}</div>

      ${heatHTML}
    </div>

    <div class="section-title" style="margin-bottom:12px;">All Violations</div>
    <div class="viol-table">
      <div class="viol-head"><div class="th">Time</div><div class="th">Code</div><div class="th">Description</div><div class="th">Evidence</div></div>
      <div>${tlRows||'<div style="padding:20px;text-align:center;color:var(--muted);font-size:13px;">No violations recorded</div>'}</div>
    </div>`;
}

window.openLightbox=function(url){
  document.getElementById('lightboxImg').src=url;
  document.getElementById('lightbox').classList.add('show');
};
window.closeLightbox=()=>document.getElementById('lightbox').classList.remove('show');

window.exportPDF=function(){
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const content=document.getElementById('reportContent').innerText;
  doc.setFontSize(18);doc.setFont(undefined,'bold');
  doc.text('ProctorAI — Exam Report',20,20);
  doc.setFontSize(10);doc.setFont(undefined,'normal');
  doc.setTextColor(120,127,146);
  doc.text(`Generated: ${new Date().toLocaleString('en-IN')}`,20,28);
  doc.setTextColor(232,234,240);
  doc.setFontSize(11);
  const lines=doc.splitTextToSize(content,170);
  doc.text(lines,20,38);
  doc.save(`proctor_report_${studentId}_${new Date().toISOString().slice(0,10)}.pdf`);
};
</script>
</body>
</html>
